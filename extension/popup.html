<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PlaceFinder XL</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      width: 320px; 
      padding: 20px; 
      background-color: #f9f9fb;
      margin: 0;
      color: #333;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .header h2 {
      margin: 0;
      font-size: 20px;
      color: #111;
    }
    .header img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 5px;
      color: #555;
    }
    input { 
      width: 100%; 
      padding: 10px; 
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #FFD700;
    }
    .flex-row {
      display: flex;
      gap: 10px;
    }
    .flex-row .form-group {
      flex: 1;
    }
    button { 
      width: 100%; 
      padding: 12px; 
      background: #FFD700; /* Jaune */
      color: #000; /* Noir */
      font-weight: bold;
      font-size: 15px;
      border: none; 
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: background 0.2s, transform 0.1s;
      margin-top: 5px;
    }
    button:hover {
      background: #e6c200;
    }
    button:active {
      transform: scale(0.98);
    }
    .status { 
      margin-top: 15px; 
      font-weight: bold; 
      text-align: center;
      font-size: 14px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }
    .status.loading { display: block; background: #e3f2fd; color: #1565c0; }
    .status.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .status.error { display: block; background: #ffebee; color: #c62828; }
  </style>
</head>
<body>

<div class="header">
  <h2>PlaceFinder XL</h2>
  <img src="icons/icon48.png" alt="Logo">
</div>

<div class="form-group">
  <label for="keyword">Que cherchez-vous ?</label>
  <input type="text" id="keyword" placeholder="Ex: restaurant, plombier...">
</div>

<div class="form-group">
  <label for="zone">Où ?</label>
  <input type="text" id="zone" placeholder="Ex: Paris, Cotonou...">
</div>

<div class="form-group">
  <label for="maxResults">Nombre maximum de résultats</label>
  <input type="number" id="maxResults" min="1" max="60" value="20">
</div>

<button id="searchButton">Rechercher</button>

<div id="status" class="status"></div>

<script src="popup.js"></script>

</body>
</html>
